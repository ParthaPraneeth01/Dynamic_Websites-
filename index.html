<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Card Changer</title>
    <!-- Modern typography from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables for dynamic theming */
        :root {
            --bg-color: #f0fdf4; 
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-main: #166534; 
            --text-desc: #4b5563;
            --btn-bg: #22c55e;
            --btn-hover: #16a34a;
            --btn-text: #ffffff;
            --shadow-color: rgba(34, 197, 94, 0.2);
            --border-color: rgba(255, 255, 255, 0.5);
        }

        /* Mood specific themes */
        body.theme-happy {
            --bg-color: #dcfce7;
            --text-main: #14532d;
            --btn-bg: #22c55e;
            --btn-hover: #16a34a;
            --shadow-color: rgba(34, 197, 94, 0.3);
            --border-color: rgba(255, 255, 255, 0.6);
        }
        
        body.theme-sad {
            --bg-color: #dbeafe;
            --text-main: #1e3a8a;
            --btn-bg: #3b82f6;
            --btn-hover: #2563eb;
            --shadow-color: rgba(59, 130, 246, 0.3);
            --border-color: rgba(255, 255, 255, 0.6);
        }
        
        body.theme-angry {
            --bg-color: #fee2e2;
            --text-main: #7f1d1d;
            --btn-bg: #ef4444;
            --btn-hover: #dc2626;
            --shadow-color: rgba(239, 68, 68, 0.3);
            --border-color: rgba(255, 255, 255, 0.6);
        }

        body.theme-calm {
            --bg-color: #f3f4f6;
            --text-main: #374151;
            --btn-bg: #6b7280;
            --btn-hover: #4b5563;
            --shadow-color: rgba(107, 114, 128, 0.3);
            --border-color: rgba(255, 255, 255, 0.6);
        }

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem; /* Spacing between card and buttons */
            transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            padding: 2rem;
        }

        /* Background floating elements (Optional embellishment) */
        .bg-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--btn-bg);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            transition: background 0.8s ease;
            animation: moveBlob 10s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes moveBlob {
            0% { transform: translate(-100px, -100px) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.1); }
        }

        /* Card Container with Glassmorphism */
        .mood-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            width: 320px;
            text-align: center;
            box-shadow: 0 25px 50px -12px var(--shadow-color), 0 0 1px 1px var(--border-color);
            border: 1px solid var(--border-color);
            transition: box-shadow 0.8s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            position: relative;
            z-index: 10;
        }

        .mood-card:hover {
            transform: translateY(-5px);
        }

        /* Emoji Animation */
        .emoji-container {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite; 
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.1));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
        }

        .emoji-container.pop {
            transform: scale(1.25) rotate(10deg);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Typography */
        h1#moodText {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            letter-spacing: -0.03em;
            transition: color 0.8s ease;
        }

        p#moodDesc {
            font-size: 1rem;
            color: var(--text-desc);
            font-weight: 300;
            line-height: 1.5;
        }

        /* Controls Container */
        .controls {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        /* Premium Button */
        button.mood-btn {
            background-color: rgba(255, 255, 255, 0.85); /* Glass-like neutral background */
            color: var(--text-desc);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: inherit;
            border-radius: 9999px; /* Pill shape */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1 1 calc(50% - 0.75rem); /* Allows 2 buttons per row, or all 4 if screen is wide enough */
            min-width: 80px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        button.mood-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            color: var(--text-main);
            border-color: var(--btn-bg);
        }

        button.mood-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Active state for buttons representing the current mood */
        button.mood-btn.active {
            background-color: var(--btn-bg);
            color: var(--btn-text);
            box-shadow: 0 8px 20px var(--shadow-color);
            border-color: transparent;
        }

        button.mood-btn.active:hover {
            background-color: var(--btn-hover);
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            animation: ripple-animation 0.6s linear;
        }

        @keyframes ripple-animation {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }
    </style>
</head>
<body class="theme-happy">

    <div class="bg-blob"></div>

    <div class="mood-card">
        <div class="emoji-container" id="moodEmoji">😊</div>
        <h1 id="moodText">Happy</h1>
        <p id="moodDesc">Feeling great today!</p>
    </div>

    <!-- 4 Vertical Buttons -->
    <div class="controls">
        <button class="mood-btn active" data-mood="happy">Happy</button>
        <button class="mood-btn" data-mood="sad">Sad</button>
        <button class="mood-btn" data-mood="angry">Angry</button>
        <button class="mood-btn" data-mood="calm">Calm</button>
    </div>

    <script>
        // Data structure for cleanly organizing mood states
        const moods = {
            'happy': {
                theme: 'theme-happy',
                emoji: '😊',
                text: 'Happy',
                desc: 'Feeling great today!'
            },
            'sad': {
                theme: 'theme-sad',
                emoji: '😢',
                text: 'Sad',
                desc: 'Feeling low today...'
            },
            'angry': {
                theme: 'theme-angry',
                emoji: '😠',
                text: 'Angry',
                desc: 'Everything is annoying!'
            },
            'calm': {
                theme: 'theme-calm',
                emoji: '😌',
                text: 'Calm',
                desc: 'Peaceful and relaxed.'
            }
        };

        const buttons = document.querySelectorAll('.mood-btn');

        function setMood(moodId) {
            const mood = moods[moodId];
            if (!mood) return;

            // 1. Update overall theme
            document.body.className = mood.theme;

            // 2. Animate and update emoji
            const emojiEl = document.getElementById("moodEmoji");
            emojiEl.classList.add('pop');
            
            // Wait for brief transition, then remove class
            setTimeout(() => {
                emojiEl.classList.remove('pop');
            }, 400);
            
            // 3. Update Text Content
            emojiEl.textContent = mood.emoji;
            document.getElementById("moodText").textContent = mood.text;
            document.getElementById("moodDesc").textContent = mood.desc;

            // 4. Update Button Styles
            buttons.forEach(btn => {
                if (btn.dataset.mood === moodId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Attach event listeners to all buttons
        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                const moodId = this.dataset.mood;
                
                // Only change if clicking a different mood
                if (!this.classList.contains('active')) {
                    setMood(moodId);
                }

                // Create ripple element purely for visual feedback
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);

                // Calculate position relative to the button
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;

                // Clean up ripple element after animation completes
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
    </script>
</body>
</html>
